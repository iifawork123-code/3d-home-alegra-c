<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3d-home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #000;
      }

      .video-container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      video {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translate(-50%, -50%);
        z-index: 1;
      }

      #app {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
      }

      /* Hide video controls */
      video::-webkit-media-controls {
        display: none !important;
      }

      video::-moz-media-controls {
        display: none !important;
      }

      /* Responsive design */
      @media (max-width: 768px) {
        video {
          width: 100%;
          height: auto;
        }
      }

      @media (max-width: 480px) {
        video {
          width: 100%;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-container">
      <!-- Add your video source here -->
      <video 
        autoplay 
        muted 
        loop 
        playsinline
      >
        <source src="your-video.mp4" type="video/mp4">
        <source src="your-video.webm" type="video/webm">
        Your browser does not support the video tag.
      </video>
    </div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
