<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3d-home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #000;
        margin: 0;
        padding: 0;
      }

      #threejs-canvas {
        width: 100%;
        height: 100vh;
        display: block;
      }

      #app {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
        pointer-events: none;
      }

      /* 3D Controls UI */
      #controls {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 100;
        pointer-events: all;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px 20px;
        border-radius: 60px;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 153, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .control-btn {
        width: 48px;
        height: 48px;
        border: 1.5px solid #0099ff;
        background: rgba(0, 0, 0, 0.3);
        color: #0099ff;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(10px);
        font-weight: bold;
      }

      .control-btn:hover {
        background: rgba(0, 153, 255, 0.15);
        box-shadow: 0 0 20px rgba(0, 153, 255, 0.4), inset 0 0 20px rgba(0, 153, 255, 0.1);
        border-color: #00d4ff;
      }

      .control-btn:active {
        transform: scale(0.92);
      }

      .control-btn.active {
        background: rgba(0, 153, 255, 0.2);
        border-color: #00d4ff;
        box-shadow: 0 0 20px rgba(0, 153, 255, 0.6);
      }

      #zoom-display {
        position: fixed;
        top: 30px;
        right: 30px;
        color: #00d4ff;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        letter-spacing: 1px;
        background: rgba(0, 0, 0, 0.5);
        padding: 12px 18px;
        border-radius: 8px;
        border: 1px solid rgba(0, 153, 255, 0.3);
        backdrop-filter: blur(20px);
        z-index: 100;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        font-weight: 600;
      }

      /* Video progress bar */
      #video-progress {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #00d4ff, #0099ff);
        width: 0%;
        z-index: 101;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        transition: width 0.1s linear;
      }

      /* Info text */
      #info-text {
        position: fixed;
        bottom: 115px;
        left: 50%;
        transform: translateX(-50%);
        color: #888;
        font-size: 12px;
        font-family: Arial, sans-serif;
        letter-spacing: 0.5px;
        z-index: 99;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      body:hover #info-text {
        opacity: 1;
      }

      @media (max-width: 768px) {
        #controls {
          bottom: 25px;
          gap: 10px;
          padding: 12px 15px;
        }

        .control-btn {
          width: 44px;
          height: 44px;
          font-size: 18px;
        }

        #zoom-display {
          top: 20px;
          right: 20px;
          font-size: 11px;
          padding: 10px 15px;
        }

        #info-text {
          bottom: 95px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="threejs-canvas"></canvas>
    <div id="app"></div>

    <!-- Video Progress Bar -->
    <div id="video-progress"></div>

    <!-- Info Text -->
    <div id="info-text">Drag to rotate • Scroll to zoom</div>

    <!-- Control Panel -->
    <div id="zoom-display">ZOOM: 100%</div>
    <div id="controls">
      <button class="control-btn" id="zoom-out" title="Zoom Out (scroll or -)">−</button>
      <button class="control-btn" id="zoom-in" title="Zoom In (scroll or +)">+</button>
      <button class="control-btn" id="auto-rotate" title="Auto Rotate">⟳</button>
      <button class="control-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
      <a href="/demo-view.html" class="control-btn" title="HDRI Demo">🌐</a>
    </div>

    <script type="module" src="/src/main.js"></script>
    
    <script>
      // Disable right-click context menu
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });

      // Disable developer tools keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'J') ||
          (e.ctrlKey && e.shiftKey && e.key === 'C') ||
          (e.ctrlKey && e.shiftKey && e.key === 'U') || // View page source
          (e.ctrlKey && e.key === 'U') // Firefox view page source
        ) {
          e.preventDefault();
          return false;
        }
      });
    </script>
  </body>
</html>
